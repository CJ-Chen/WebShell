[workspace]
name = "webshell"
version = "0.1.0"
description = "Browser-based SSH and SFTP relay workspace"
authors = ["WebShell contributors"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11,<3.13"
nodejs = ">=22,<23"

[pypi-dependencies]
fastapi = ">=0.115,<1"
uvicorn = { version = ">=0.30,<1", extras = ["standard"] }
sqlalchemy = ">=2.0,<3"
greenlet = ">=3.1,<4"
aiosqlite = ">=0.20,<1"
alembic = ">=1.14,<2"
asyncssh = ">=2.17,<3"
argon2-cffi = ">=23.1,<26"
cryptography = ">=43,<46"
pydantic-settings = ">=2.6,<3"
python-multipart = ">=0.0.12,<1"
email-validator = ">=2.2,<3"
httpx = ">=0.27,<1"
pytest = ">=8,<9"
pytest-asyncio = ">=0.24,<1"

[tasks]
backend = { cmd = "uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 --reload", description = "Run the FastAPI development server" }
backend-prod = { cmd = "uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000", description = "Run the FastAPI server without reload" }
frontend-install = { cmd = "npm --prefix frontend install", description = "Install frontend npm packages" }
frontend = { cmd = "npm --prefix frontend run dev", depends-on = ["frontend-install"], description = "Run the Vite development server" }
frontend-build = { cmd = "npm --prefix frontend run build", depends-on = ["frontend-install"], description = "Build the frontend" }
frontend-lint = { cmd = "npm --prefix frontend run lint", depends-on = ["frontend-install"], description = "Lint the frontend" }
test-backend = { cmd = "pytest backend/tests", description = "Run backend tests" }
check-backend = { cmd = "python -m compileall -q backend/app", description = "Compile-check backend Python" }
migrate = { cmd = "alembic -c backend/alembic.ini upgrade head", description = "Apply database migrations" }
create-admin = { cmd = "python -m app.cli create-admin", description = "Create the initial administrator; append CLI arguments after --" }
allow-cidr = { cmd = "python -m app.cli allow-cidr", description = "Add an allowed destination CIDR; append CLI arguments after --" }
init-key = { cmd = "python -m app.cli init-key", description = "Create a credential encryption key; append --path for production" }
set-password = { cmd = "python -m app.cli set-password", description = "Set a WebShell user's password and revoke existing sessions" }

[activation.env]
PYTHONPYCACHEPREFIX = "/tmp/webshell-pycache"
PYTHONPATH = "backend"
